<!-- ===========================================================================
     Asistente Virtual ETSI Informática (UMA) — Marcado del widget embebible
     ---------------------------------------------------------------------------
     Fragmento HTML que embed.js carga (vía fetch) e inyecta dentro del Shadow
     DOM. No es un documento completo: solo el botón flotante y el panel de chat.
============================================================================ -->
<button class="launcher" id="launcher" title="Abrir asistente">
    <svg class="icon-chat" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
    </svg>
    <svg class="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
</button>

<div class="panel" id="panel" role="dialog" aria-label="Asistente Virtual ETSI Informática">
    <div class="wheader">
        <div class="header-brand">
            <div class="header-logo">ETSI</div>
            <div>
                <div class="header-title">Asistente Virtual</div>
                <div class="header-subtitle">ETSI Informática · UMA</div>
            </div>
        </div>
        <button class="header-close" id="header-close" title="Cerrar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
    </div>

    <div class="chat" id="chat">
        <div class="message-wrapper bot">
            <div class="sender-label">Asistente</div>
            <div class="message">¡Hola! Soy el asistente virtual de la ETSI Informática. Puedo ayudarte con información sobre los grados, normativas, trámites y más. ¿En qué puedo ayudarte?</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Escribe tu pregunta aquí..." autocomplete="off">
        <button class="send-btn" id="send-btn" title="Enviar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>
</div>
